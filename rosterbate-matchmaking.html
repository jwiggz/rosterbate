<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>RosterBate - Find a League</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>
<script src="sport-config.js"></script>

<style>
:root{
  --bg:#0a0e1a;--bg2:#111827;--bg3:#1c2333;--card:#161d2e;--border:#1e2d45;
  --accent:#f97316;--green:#22c55e;--red:#ef4444;--blue:#3b82f6;--purple:#8b5cf6;
  --text:#f1f5f9;--text2:#94a3b8;--text3:#475569;
  --fd:'Barlow Condensed',sans-serif;--fb:'Barlow',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--fb);overflow:hidden;}
input[type=number]{-moz-appearance:textfield;appearance:textfield;}
input[type=number]::-webkit-outer-spin-button,
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 50% -5%,rgba(249,115,22,.15) 0%,transparent 65%);pointer-events:none;}
.screen{display:none;flex-direction:column;height:100dvh;overflow:hidden;}
.screen.active{display:flex;}
.ph{background:var(--bg2);border-bottom:1px solid var(--border);padding:10px 14px;flex-shrink:0;display:flex;align-items:center;gap:10px;}
.pt{font-family:var(--fd);font-size:18px;font-weight:800;text-transform:uppercase;}
.bb{background:none;border:none;color:var(--text2);font-size:20px;cursor:pointer;padding:2px 6px;}
.sb{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px;display:flex;flex-direction:column;gap:12px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:14px;}
.ct{font-family:var(--fd);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);margin-bottom:10px;}
.btn-p{background:var(--accent);border:none;border-radius:10px;padding:14px;font-family:var(--fd);font-size:16px;font-weight:800;text-transform:uppercase;color:#fff;cursor:pointer;width:100%;transition:opacity .15s;}
.btn-p:disabled{opacity:.5;cursor:not-allowed;}
.btn-g{background:var(--green);border:none;border-radius:10px;padding:14px;font-family:var(--fd);font-size:16px;font-weight:800;text-transform:uppercase;color:#fff;cursor:pointer;width:100%;}
.btn-s{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px;font-family:var(--fd);font-size:14px;font-weight:700;color:var(--text2);cursor:pointer;width:100%;}
.btn-danger{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.35);border-radius:10px;padding:12px;font-family:var(--fd);font-size:14px;font-weight:800;color:var(--red);cursor:pointer;width:100%;}
.input{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-size:14px;font-family:var(--fb);outline:none;width:100%;}
.input:focus{border-color:var(--accent);}
.schedule-grid{display:grid;grid-template-columns:minmax(0,1.05fr) minmax(0,1.35fr);gap:10px;align-items:start;}
.schedule-grid .ct{margin-bottom:6px;}
.schedule-time-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;align-items:start;}
.schedule-picker{display:grid;gap:4px;align-content:start;}
.schedule-picker .sl{margin:0;font-size:10px;text-align:center;}
.schedule-locked{display:inline-flex;align-items:center;justify-content:center;background:rgba(249,115,22,.15);border:1px solid var(--accent);border-radius:7px;padding:7px 13px;font-family:var(--fd);font-size:13px;font-weight:700;color:var(--accent);}
.schedule-date-wrap,.schedule-time-wrap{display:grid;align-content:start;}
.schedule-action{margin-top:12px;}
.schedule-top-row{display:grid;grid-template-columns:190px minmax(0,1fr) minmax(0,1.35fr);gap:10px;align-items:start;}
.schedule-top-row .ct{margin-bottom:6px;}
.schedule-timing-wrap{display:grid;gap:6px;align-content:start;}
.schedule-helper{margin-top:8px;font-size:11px;color:var(--text3);line-height:1.55;}
.schedule-time-wrap{justify-items:stretch;}
.schedule-time-wrap > .ct{justify-self:start;width:100%;}
.schedule-time-grid{width:100%;justify-content:stretch;}
.schedule-picker select.input{text-align:left;}
.format-row{display:flex;align-items:center;gap:8px;flex-wrap:nowrap;}
.format-row .chips{flex:0 1 auto;}
.auction-budget-wrap{display:none;align-items:center;gap:6px;flex-shrink:0;}
.auction-budget-label{font-family:var(--fd);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--text3);white-space:nowrap;}
.auction-budget-input{width:82px;padding:7px 10px;font-size:13px;line-height:1.1;}
.chips{display:flex;flex-wrap:wrap;gap:6px;}
.chip{background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:7px 13px;font-family:var(--fd);font-size:13px;font-weight:700;color:var(--text2);cursor:pointer;transition:all .15s;}
.chip.on{background:rgba(249,115,22,.15);border-color:var(--accent);color:var(--accent);}
.chip.moneyball{background:rgba(34,197,94,.12);border-color:rgba(34,197,94,.35);color:var(--green);}
.chip.moneyball.on{background:var(--accent);border-color:var(--accent);color:#fff;}
.sl{font-family:var(--fd);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);margin-bottom:6px;margin-top:4px;}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--green);color:#fff;font-family:var(--fd);font-size:14px;font-weight:700;padding:9px 20px;border-radius:30px;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;z-index:300;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.mm-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;}
.mm-tab{flex:1;padding:11px 4px;font-family:var(--fd);font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--text3);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;}
.mm-tab.on{color:var(--accent);border-bottom-color:var(--accent);}
.lobby-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:13px;display:flex;flex-direction:column;gap:8px;}
.lobby-card:hover{border-color:rgba(249,115,22,.3);}
.lobby-card-top{display:flex;align-items:center;justify-content:space-between;}
.lobby-name{font-family:var(--fd);font-size:16px;font-weight:800;}
.lobby-status{font-family:var(--fd);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:3px 8px;border-radius:20px;}
.lobby-status.waiting{background:rgba(34,197,94,.15);color:var(--green);}
.lobby-status.full{background:rgba(239,68,68,.15);color:var(--red);}
.lobby-status.scheduled{background:rgba(59,130,246,.15);color:#93c5fd;}
.lobby-status.locked{background:rgba(245,158,11,.15);color:#fbbf24;}
.lobby-tags{display:flex;flex-wrap:wrap;gap:5px;}
.lobby-tag{background:var(--bg3);border:1px solid var(--border);border-radius:5px;padding:2px 7px;font-size:10px;color:var(--text2);font-family:var(--fd);font-weight:700;text-transform:uppercase;}
.lobby-av{width:24px;height:24px;border-radius:50%;border:2px solid var(--bg2);display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-size:9px;font-weight:800;color:#fff;margin-left:-4px;}
.lobby-av:first-child{margin-left:0;}
.lobby-slots{font-size:11px;color:var(--text2);margin-left:8px;}
.wr-player{display:flex;align-items:center;gap:10px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:9px 12px;margin-bottom:6px;}
.wr-av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-size:13px;font-weight:800;color:#fff;flex-shrink:0;}
.wr-slot{display:flex;align-items:center;gap:10px;background:var(--bg3);border:1px dashed var(--border);border-radius:8px;padding:9px 12px;margin-bottom:6px;opacity:.45;}
.wr-slot-av{width:34px;height:34px;border-radius:50%;background:var(--bg2);border:1px dashed var(--border);flex-shrink:0;}
.ready-btn{background:var(--green);border:none;border-radius:11px;padding:15px;font-family:var(--fd);font-size:18px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:#fff;cursor:pointer;width:100%;}
.ready-btn.is-ready{background:var(--text3);}
.countdown-ring{position:relative;width:100px;height:100px;margin:0 auto;}
.countdown-ring svg{transform:rotate(-90deg);}
.countdown-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-size:36px;font-weight:900;color:var(--accent);}
.empty{text-align:center;padding:40px 20px;color:var(--text3);}
.empty-icon{font-size:40px;margin-bottom:10px;}
.empty-title{font-family:var(--fd);font-size:16px;font-weight:800;text-transform:uppercase;margin-bottom:6px;color:var(--text2);}
.empty-desc{font-size:12px;line-height:1.6;}
.filter-active{background:rgba(249,115,22,.15)!important;border-color:var(--accent)!important;color:var(--accent)!important;}
.global-chat{display:flex;flex-direction:column;min-height:360px;}
.global-chat-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:10px;flex-wrap:wrap;}
.global-chat-title{font-family:var(--fd);font-size:22px;font-weight:900;text-transform:uppercase;}
.global-chat-sub{font-size:12px;color:var(--text2);line-height:1.55;max-width:520px;}
.global-chat-room{font-size:11px;color:var(--green);font-family:var(--fd);font-weight:700;text-transform:uppercase;letter-spacing:.5px;}
.global-chat-feed{flex:1;min-height:220px;max-height:420px;overflow-y:auto;background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:12px;display:flex;flex-direction:column;gap:10px;}
.global-chat-row{display:flex;gap:10px;align-items:flex-start;}
.global-chat-av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-size:10px;font-weight:800;color:#fff;flex-shrink:0;}
.global-chat-meta{font-family:var(--fd);font-size:12px;font-weight:700;color:var(--text2);}
.global-chat-text{font-size:13px;color:var(--text);line-height:1.55;word-break:break-word;}
.global-chat-compose{display:flex;gap:8px;align-items:stretch;margin-top:12px;}
.global-chat-input{min-height:48px;height:48px;max-height:48px;resize:none;overflow-y:auto;padding-top:12px;padding-bottom:12px;}
.advbox{margin-top:10px;padding:12px;border:1px solid var(--border);border-radius:12px;background:rgba(15,23,42,.5);}
.advtitle{font-family:var(--fd);font-size:15px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;}
.advsub{font-size:11px;color:var(--text3);margin-top:3px;}
.advgrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin-top:12px;}
.rules-layout{display:flex;gap:8px;margin-top:10px;align-items:start;}
.rules-left{flex:1 1 auto;display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;}
.rules-right{flex:0 0 320px;min-width:320px;display:flex;}
.scoregrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px 12px;align-items:start;margin-top:12px;}
.scorecol{display:grid;gap:8px;min-width:0;}
.scorehead{display:flex;align-items:center;justify-content:space-between;gap:8px;padding-bottom:4px;border-bottom:1px solid var(--border);}
.scorehead .sh{font-family:var(--fd);font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.7px;}
.score-row{display:grid;grid-template-columns:minmax(0,1fr) 98px;gap:8px;align-items:center;}
.score-label{font-size:12px;color:var(--text);line-height:1.25;min-width:0;}
.score-stepper{min-width:0;}
.score-stepper .stepper{width:100%;}
.score-stepper .stepper input[type=number]{font-size:12px!important;color:var(--text)!important;-webkit-text-fill-color:var(--text)!important;}
.score-stepper .stepper-btn{height:19px;}
.rule-summary{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:0;padding:10px 12px;border:1px solid var(--border);border-radius:10px;background:var(--bg3);width:100%;height:100%;}
.rule-summary-copy{font-size:12px;color:var(--text);line-height:1.45;}
.rule-link{background:none;border:none;color:var(--accent);font-family:var(--fd);font-size:12px;font-weight:800;text-transform:uppercase;cursor:pointer;white-space:nowrap;}
.inline-pos-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;}
.inline-pos-row{display:grid;grid-template-columns:minmax(0,1fr) 98px;gap:8px;align-items:center;}
.inline-pos-name{font-size:12px;color:var(--text);line-height:1.25;min-width:0;}
.inline-pos-stepper{min-width:0;}
.rule-field{display:grid;gap:4px;}
.rule-field .ct{margin:0;}
.stepper{display:flex;align-items:stretch;background:linear-gradient(180deg,var(--bg3),#141d2d);border:1px solid var(--border);border-radius:9px;overflow:hidden;box-shadow:inset 0 1px 0 rgba(255,255,255,.02);}
.stepper:focus-within{border-color:rgba(249,115,22,.55);box-shadow:0 0 0 3px rgba(249,115,22,.12);}
.stepper input[type=number]{border:none!important;background:transparent!important;box-shadow:none!important;border-radius:0!important;padding:8px 10px!important;text-align:right;font-size:13px!important;min-height:38px;color:var(--text)!important;-webkit-text-fill-color:var(--text)!important;}
.stepper-btns{display:flex;flex-direction:column;border-left:1px solid var(--border);background:rgba(255,255,255,.02);}
.stepper-btn{width:28px;height:18px;border:none;background:transparent;color:var(--text2);font-family:var(--fd);font-size:11px;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s,color .15s;}
.stepper-btn:hover{background:rgba(249,115,22,.14);color:var(--accent);}
.stepper-btn:active{background:rgba(249,115,22,.22);}
.stepper-btn + .stepper-btn{border-top:1px solid var(--border);}
.stepper.readonly .stepper-btns{display:none;}
.sheet{display:none;position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:250;align-items:flex-end;justify-content:center;}
.sheet.open{display:flex;}
.sheet-card{width:100%;max-width:560px;max-height:86dvh;overflow:auto;background:var(--bg2);border-radius:18px 18px 0 0;border-top:1px solid var(--border);padding:16px 16px 28px;}
.sheet-handle{width:38px;height:4px;border-radius:999px;background:var(--text3);margin:0 auto 14px;}
.sheet-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:14px;}
.sheet-title{font-family:var(--fd);font-size:22px;font-weight:900;text-transform:uppercase;}
.sheet-sub{font-size:12px;color:var(--text2);line-height:1.55;margin-top:4px;}
.sheet-close{background:var(--bg3);border:1px solid var(--border);border-radius:9px;padding:8px 12px;color:var(--text2);font-family:var(--fd);font-size:12px;font-weight:800;text-transform:uppercase;cursor:pointer;}
.posgrid{display:grid;grid-template-columns:minmax(0,1.6fr) 88px 96px;gap:8px;align-items:center;}
.posgrid .ph2{padding:0 0 6px;font-family:var(--fd);font-size:10px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;color:var(--text3);}
.posname{font-size:12px;color:var(--text2);padding:8px 0;border-bottom:1px solid rgba(30,45,69,.7);}
.sheet-actions{display:flex;gap:10px;margin-top:16px;}
@media (max-width: 860px){
  .rules-layout{flex-direction:column;}
  .rules-right{flex:1 1 auto;min-width:0;}
  .rules-left{grid-template-columns:repeat(2,minmax(0,1fr));}
  .inline-pos-grid{grid-template-columns:1fr;}
  .scoregrid{grid-template-columns:1fr;}
  .schedule-top-row{grid-template-columns:1fr;}
}
@media (max-width: 640px){
  .rules-left{grid-template-columns:1fr;}
}

/* RosterBate Home Header */
.rb-home-bar{position:sticky;top:0;z-index:100;background:rgba(10,14,26,.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:center;padding:10px 14px;flex-shrink:0;}
.rb-home-link{font-family:var(--fd);font-size:18px;font-weight:900;text-transform:uppercase;letter-spacing:1px;color:var(--text);text-decoration:none;display:flex;align-items:center;gap:6px;}
.rb-home-link span{color:var(--accent);}
.rb-home-link:hover{opacity:.85;}
::-webkit-scrollbar{width:0;}
</style>
</head>
<body>

<!-- MATCHMAKING LOBBY -->
<div id="mmLobby" class="screen active">
  <div class="ph" style="position:relative;">
    <button class="bb" onclick="history.back()" style="position:absolute;left:14px;">&larr;</button>
    <a href="index.html" class="rb-home-link" style="margin:0 auto;">Roster<span>Bate</span></a>
    <div id="mmOnline" style="margin-left:auto;font-family:var(--fd);font-size:11px;font-weight:700;color:var(--green);">connecting...</div>
  </div>
  <div class="mm-tabs">
    <button class="mm-tab on" onclick="mmTab('create',this)">+ Create</button>
    <button class="mm-tab" onclick="mmTab('browse',this)">Browse</button>
    <button class="mm-tab" onclick="mmTab('live',this)">Live Drafts</button>
    <button class="mm-tab" onclick="mmTab('private',this)">League Code</button>
  </div>
  <div class="sb" id="mmTabContent"></div>
</div>

<!-- WAITING ROOM -->
<div id="mmWaiting" class="screen">
  <div class="ph">
    <button class="bb" onclick="mmLeaveWaiting()">&larr;</button>
    <div class="pt" id="wrTitle">Waiting Room</div>
    <div id="wrCode" style="margin-left:auto;font-family:var(--fd);font-size:13px;font-weight:800;color:var(--accent);"></div>
  </div>
  <div class="sb">
    <div class="card" id="wrInfo"></div>
    <div>
      <div class="sl">Players</div>
      <div id="wrPlayers"></div>
    </div>
    <div id="wrReadySection">
      <button class="ready-btn" id="wrReadyBtn" onclick="mmToggleReady()">Ready Up</button>
      <div style="text-align:center;margin-top:8px;font-size:11px;color:var(--text3);" id="wrReadyCount"></div>
      <button class="btn-s" id="wrSoloBtn" onclick="mmStartSoloTest()" style="margin-top:10px;display:none;">Start Solo Test</button>
      <button class="btn-danger" onclick="mmLeaveWaiting()" style="margin-top:10px;">Leave League</button>
    </div>
    <div id="wrCountdown" style="display:none;text-align:center;padding:10px 0;">
      <div style="font-family:var(--fd);font-size:14px;font-weight:700;text-transform:uppercase;color:var(--text3);margin-bottom:12px;">Draft starts in</div>
      <div class="countdown-ring">
        <svg width="100" height="100"><circle cx="50" cy="50" r="44" fill="none" stroke="var(--border)" stroke-width="6"/><circle id="cdCircle" cx="50" cy="50" r="44" fill="none" stroke="var(--accent)" stroke-width="6" stroke-dasharray="276" stroke-dashoffset="0" style="transition:stroke-dashoffset 1s linear;"/></svg>
        <div class="countdown-num" id="cdNum">5</div>
      </div>
    </div>
    <div class="card">
      <div class="ct">Lobby Chat</div>
      <div id="wrChat" style="min-height:60px;max-height:120px;overflow-y:auto;display:flex;flex-direction:column;gap:4px;margin-bottom:8px;"></div>
      <div style="display:flex;gap:6px;">
        <input type="text" class="input" id="wrChatInput" placeholder="Say something..." onkeydown="if(event.key==='Enter')mmSendLobbyChat()" style="flex:1;">
        <button onclick="mmSendLobbyChat()" style="background:var(--accent);border:none;border-radius:8px;padding:8px 14px;color:#fff;font-size:16px;cursor:pointer;">Send</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="mmToast"></div>
<div class="sheet" id="mmPositionSheet">
  <div class="sheet-card">
    <div class="sheet-handle"></div>
    <div class="sheet-head">
      <div>
        <div class="sheet-title">Position Eligibility</div>
        <div class="sheet-sub">Set starters and maximum roster spots for each position. Basketball uses ESPN-style labels by default.</div>
      </div>
      <button type="button" class="sheet-close" onclick="closeCreatePositionSheet()">Close</button>
    </div>
    <div class="posgrid" id="mmPositionGrid"></div>
    <div class="sheet-actions">
      <button type="button" class="btn-p" onclick="applyCreatePositionSheet()">Save Position Rules</button>
    </div>
  </div>
</div>

function formatDraftDateTime(ts){
  const value=Number(ts||0);
  if(!value) return 'Not scheduled';
  return new Date(value).toLocaleString([], {
    month:'short',
    day:'numeric',
    hour:'numeric',
    minute:'2-digit'
  });
}

function formatCountdown(ms){
  const total=Math.max(0, Math.floor(Number(ms||0)/1000));
  const hrs=Math.floor(total/3600);
  const mins=Math.floor((total%3600)/60);
  if(hrs>0) return hrs+'h '+String(mins).padStart(2,'0')+'m';
  const secs=total%60;
  return mins+'m '+String(secs).padStart(2,'0')+'s';
}

function toDatetimeLocalValue(ts){
  const value=Number(ts||0);
  if(!value) return '';
  const dt=new Date(value - (new Date().getTimezoneOffset()*60000));
  return dt.toISOString().slice(0,16);
}

function toDateInputValue(ts){
  const value=Number(ts||0);
  if(!value) return '';
  const dt=new Date(value - (new Date().getTimezoneOffset()*60000));
  return dt.toISOString().slice(0,10);
}

function toTimeInputValue(ts){
  const value=Number(ts||0);
  if(!value) return '';
  const dt=new Date(value);
  const hh=String(dt.getHours()).padStart(2,'0');
  const mm=String(dt.getMinutes()).padStart(2,'0');
  return hh+':'+mm;
}

function getMinimumScheduledStart(){
  return Date.now()+DRAFT_ROOM_UNLOCK_MS;
}

function getMinimumScheduledStartRounded(){
  const stepMs=15*60*1000;
  return Math.ceil(getMinimumScheduledStart()/stepMs)*stepMs;
}

function getMinimumScheduleDateValue(){
  return toDateInputValue(getMinimumScheduledStartRounded());
}

function getMinimumScheduleTimeValue(){
  return toTimeInputValue(getMinimumScheduledStartRounded());
}

function toScheduleHourValue(ts){
  const value=Number(ts||0);
  if(!value) return '';
  const hour=new Date(value).getHours();
  const hour12=((hour+11)%12)+1;
  return String(hour12);
}

function toScheduleMinuteValue(ts){
  const value=Number(ts||0);
  if(!value) return '';
  return String(new Date(value).getMinutes()).padStart(2,'0');
}

function toScheduleMeridiemValue(ts){
  const value=Number(ts||0);
  if(!value) return 'PM';
  return new Date(value).getHours()>=12 ? 'PM' : 'AM';
}

function buildScheduleSelectOptions(values, currentValue, formatter){

    const selected=String(value)===String(currentValue) ? ' selected' : '';
    return `<option value="${value}"${selected}>${formatter?formatter(value):value}</option>`;

}

function buildTeamSizeChips(currentValue, handlerName, withLabel){
  return Array.from({length:13}, (_,idx)=>{
    const size=idx+2;
    const active=Number(currentValue)===size ? ' on' : '';
    const label=withLabel ? `${size} Teams` : String(size);
    return `<div class="chip${active}" onclick="${handlerName}(${size},this)">${label}</div>`;
  }).join('');
}

function parseScheduledStartInputs(){
  const dateValue=document.getElementById('cStartDate')?.value||'';
  const hourValue=document.getElementById('cStartHour')?.value||'';
  const minuteValue=document.getElementById('cStartMinute')?.value||'';
  const meridiemValue=document.getElementById('cStartMeridiem')?.value||'AM';
  if(!dateValue || !hourValue || minuteValue==='') return 0;
  let hour24=parseInt(hourValue,10)%12;
  if(String(meridiemValue).toUpperCase()==='PM') hour24+=12;
  const hh=String(hour24).padStart(2,'0');
  const mm=String(parseInt(minuteValue,10)||0).padStart(2,'0');
  return new Date(`${dateValue}T${hh}:${mm}:00`).getTime();
}

function syncScheduledTimeInputs(){
  const dateInput=document.getElementById('cStartDate');
  const hourInput=document.getElementById('cStartHour');
  const minuteInput=document.getElementById('cStartMinute');
  const meridiemInput=document.getElementById('cStartMeridiem');
  if(!dateInput || !hourInput || !minuteInput || !meridiemInput) return;
  const minDate=getMinimumScheduleDateValue();
  if(!dateInput.value) dateInput.value=minDate;
  const selectedDate=dateInput.value||'';
  const selectedAt=parseScheduledStartInputs();
  const minStart=getMinimumScheduledStartRounded();
  if(selectedDate===minDate && (!selectedAt || selectedAt<minStart)){
    hourInput.value=toScheduleHourValue(minStart);
    minuteInput.value=toScheduleMinuteValue(minStart);
    meridiemInput.value=toScheduleMeridiemValue(minStart);
  }
}

function computeDraftAccessAt(startAt){
  const start=Number(startAt||0);
  return start ? Math.max(Date.now(), start - DRAFT_ROOM_UNLOCK_MS) : 0;
}

function getLobbyPlayerList(lobby){
  return Object.values(lobby?.players||{});
}

function getLobbyOrderBaseline(lobby){
  return getLobbyPlayerList(lobby)
    .filter(Boolean)
    .sort((a,b)=>{
      const aj=Number(a?.joinedAt||0), bj=Number(b?.joinedAt||0);
      if(aj!==bj) return aj-bj;
      return String(a?.name||'').localeCompare(String(b?.name||''));
    });
}

function buildDeterministicDraftOrder(lobby){
  const players=getLobbyOrderBaseline(lobby);
  const seedBase=String(lobby?.id||'')+'|'+String(lobby?.scheduledStartAt||'');
  function scoreFor(id){
    const key=seedBase+'|'+String(id||'');
    let hash=2166136261;
    for(let i=0;i<key.length;i++){
      hash^=key.charCodeAt(i);
      hash=Math.imul(hash,16777619);
    }
    return hash>>>0;
  }
  return players
    .map(player=>({player,score:scoreFor(player?.id)}))
    .sort((a,b)=>a.score-b.score || String(a.player?.name||'').localeCompare(String(b.player?.name||'')))
    .map(entry=>entry.player?.id)
    .filter(Boolean);
}

function isScheduledLobby(lobby){
  return !!Number(lobby?.scheduledStartAt||0);
}

function isLobbyJoinLocked(lobby){
  if(!isScheduledLobby(lobby)) return false;
  const accessAt=Number(lobby?.draftAccessAt||0);
  return !!(accessAt && Date.now() >= accessAt);
}

function canOpenDraftRoom(lobby){
  if(!lobby) return false;
  if(!isScheduledLobby(lobby)) return lobby.status==='started' || lobby.status==='draft_room_open';
  const accessAt=Number(lobby?.draftAccessAt||0);
  if(!accessAt || Date.now() < accessAt) return false;
  if(String(lobby?.draftOrderMode||'random_30m')==='manual'){
    return Array.isArray(lobby?.finalDraftOrder) && lobby.finalDraftOrder.length===Number(lobby?.teamSize||0);
  }
  return true;
}

async function ensureScheduledLobbyState(lobbyId, lobby){
  const target=lobby||((await db.ref('lobbies/'+lobbyId).once('value')).val());
  if(!target || !isScheduledLobby(target)) return target;
  const now=Date.now();
  const accessAt=Number(target.draftAccessAt||0);
  if(!accessAt || now < accessAt) return target;
  const players=getLobbyPlayerList(target);
  const expectedTeamSize=Number(target.teamSize||0);
  const updates={};
  if(!target.draftRoomId) updates.draftRoomId=lobbyId;
  if(String(target.draftOrderMode||'random_30m')==='random_30m'){
    if(!(Array.isArray(target.finalDraftOrder) && target.finalDraftOrder.length===expectedTeamSize) && players.length===expectedTeamSize){
      updates.finalDraftOrder=buildDeterministicDraftOrder({...target,id:lobbyId});
      updates.orderFinalizedAt=now;
    }
  }
  if((updates.finalDraftOrder || (Array.isArray(target.finalDraftOrder) && target.finalDraftOrder.length===expectedTeamSize)) && target.status!=='started'){
    updates.status='draft_room_open';
  }
  if(Object.keys(updates).length){
    await db.ref('lobbies/'+lobbyId).update(updates);
    return {...target,...updates};
  }
  return target;
}

function getCurrentDraftOrder(lobby){
  const byId=new Map(getLobbyOrderBaseline(lobby).map(player=>[player.id,player]));
  if(Array.isArray(lobby?.finalDraftOrder) && lobby.finalDraftOrder.length){
    return lobby.finalDraftOrder.map(id=>byId.get(id)).filter(Boolean);
  }
  return getLobbyOrderBaseline(lobby);
}

async function saveManualDraftOrder(lobbyId, orderedIds){
  const clean=(Array.isArray(orderedIds)?orderedIds:[]).filter(Boolean);
  if(!clean.length) return;
  await db.ref('lobbies/'+lobbyId).update({
    finalDraftOrder:clean,
    orderFinalizedAt:Date.now()
  });
}

async function moveDraftOrder(lobbyId, fromIndex, dir){
  const snap=await db.ref('lobbies/'+lobbyId).once('value');
  if(!snap.exists()) return;
  const lobby={id:lobbyId,...(snap.val()||{})};
  if(lobby.createdBy!==myId) return;
  const ordered=getCurrentDraftOrder(lobby).map(player=>player.id);
  const toIndex=fromIndex+dir;
  if(toIndex<0 || toIndex>=ordered.length) return;
  const next=ordered.slice();
  const [moved]=next.splice(fromIndex,1);
  next.splice(toIndex,0,moved);
  await saveManualDraftOrder(lobbyId,next);
}

async function finalizeJoinOrder(lobbyId){
  const snap=await db.ref('lobbies/'+lobbyId).once('value');
  if(!snap.exists()) return;
  const lobby={id:lobbyId,...(snap.val()||{})};
  if(lobby.createdBy!==myId) return;
  await saveManualDraftOrder(lobbyId,getCurrentDraftOrder(lobby).map(player=>player.id));
  toast('Draft order saved');
}

  const irSlots=Math.max(0, parseInt(document.getElementById('mmIr')?.value)||0);
  if(positions.BN){
    positions.BN=Object.assign({}, positions.BN, { starters:bench });
  }
  if(positions.BE){

  }

function hydrateStepperInputs(root){
  (root||document).querySelectorAll('input[type="number"]').forEach(function(input){
    if(input.closest('.stepper') || input.closest('.cnum-wrap')) return;
    const wrapper=document.createElement('div');
    wrapper.className='stepper'+(input.readOnly?' readonly':'');
    input.parentNode.insertBefore(wrapper,input);
    wrapper.appendChild(input);
    if(input.readOnly) return;
    const btns=document.createElement('div');
    btns.className='stepper-btns';
    btns.innerHTML='<button type="button" class="stepper-btn">+</button><button type="button" class="stepper-btn">−</button>';
    wrapper.appendChild(btns);
    const [plus,minus]=btns.querySelectorAll('.stepper-btn');
    function nudge(dir){
      const step=parseFloat(input.step||'1')||1;
      const min=input.min!==''?parseFloat(input.min):null;
      const max=input.max!==''?parseFloat(input.max):null;
      let value=parseFloat(input.value||'0');
      value=isNaN(value)?0:value+(dir*step);
      if(min!==null) value=Math.max(min,value);
      if(max!==null) value=Math.min(max,value);
      input.value=String(Math.round(value*1000)/1000);
      input.dispatchEvent(new Event('change',{bubbles:true}));
      input.dispatchEvent(new Event('input',{bubbles:true}));
    }
    plus.addEventListener('click',function(){ nudge(1); });
    minus.addEventListener('click',function(){ nudge(-1); });
  });
}

async function loadLiveDrafts(){
  const list=document.getElementById('liveDraftList');
  if(!list) return;
  list.innerHTML='<div class="empty"><div class="empty-icon">...</div><div class="empty-title">Loading...</div></div>';
  try{
    const snap=await db.ref('lobbies').once('value');
    if(!snap.exists()){ list.innerHTML=emptyHtml('No live drafts','When one of your leagues starts, it will appear here.'); return; }
    const live=[];
    const tasks=[];
    snap.forEach(c=>{
      const lobby={id:c.key,...(c.val()||{})};
      if(!(lobby.players||{})[myId]) return;
      tasks.push(ensureScheduledLobbyState(c.key,lobby).then(next=>{
        const target={id:c.key,...(next||lobby)};
        if(['draft_room_open','started','scheduled','waiting'].includes(target.status)) live.push(target);
      }).catch(()=>{}));
    });
    if(tasks.length) await Promise.all(tasks);
    live.sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
    if(!live.length){ list.innerHTML=emptyHtml('No live drafts','When one of your leagues starts, it will appear here.'); return; }
    list.innerHTML=live.map(lobby=>{
      const players=Object.values(lobby.players||{});
      const me=lobby.players?.[myId];
      const joined = me?.joinedAt ? new Date(me.joinedAt).toLocaleString([], {month:'short', day:'numeric', hour:'numeric', minute:'2-digit'}) : 'Joined';
      const statusLabel=lobby.status==='started'?'Live':lobby.status==='draft_room_open'?'Draft Room Open':'Scheduled';
      const statusClass=lobby.status==='started'?'waiting':(lobby.status==='draft_room_open'?'locked':'scheduled');
      const subline=lobby.status==='scheduled'
        ? `Starts ${formatDraftDateTime(lobby.scheduledStartAt)} · Draft room opens ${formatDraftDateTime(lobby.draftAccessAt)}`
        : (lobby.status==='draft_room_open' && Number(lobby.scheduledStartAt||0)>Date.now()
            ? `Draft starts ${formatDraftDateTime(lobby.scheduledStartAt)}`
            : `You joined ${joined}`);
      return `<div class="lobby-card" style="margin-bottom:8px;">
        <div class="lobby-card-top">
          <div class="lobby-name">${lobby.name||'League'}</div>
          <div class="lobby-status ${statusClass}">${statusLabel}</div>

        <div style="display:flex;gap:8px;margin-top:10px;">

          <button onclick="leaveLeague('${lobby.id}', true)" style="background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.35);border-radius:7px;padding:10px 12px;font-family:var(--fd);font-size:13px;font-weight:800;text-transform:uppercase;color:var(--red);cursor:pointer;">Leave</button>
        </div>
      </div>`;
    }).join('');
  }catch(e){
    console.error(e);
    list.innerHTML=emptyHtml('Unable to load live drafts','Please try again in a moment.');
  }

async function resumeLiveDraft(lobbyId){
  try{
    const snap=await db.ref('lobbies/'+lobbyId).once('value');
    if(!snap.exists()){ toast('This draft is no longer available','var(--red)'); return; }
    const lobby=await ensureScheduledLobbyState(lobbyId,{id:lobbyId,...snap.val()}) || {id:lobbyId,...snap.val()};
    if(!(lobby.players||{})[myId]){ toast('You are no longer in this league','var(--red)'); renderLive(); return; }
    if(canOpenDraftRoom(lobby)) openLiveDraft(lobby);
    else showWaitingRoom(lobbyId);
  }catch(e){
    console.error(e);
    toast('Unable to open draft','var(--red)');
  }
}

function setBrowseFilter(key, val, el){
  browseFilters[key]=val;
  el.closest('.chips').querySelectorAll('.chip').forEach(c=>c.classList.remove('filter-active'));
  el.classList.add('filter-active');
  loadBrowse();
}

async function loadBrowse(){
  const list=document.getElementById('browseList');
  if(!list) return;
  list.innerHTML='<div class="empty"><div class="empty-icon">...</div><div class="empty-title">Loading...</div></div>';
  try{
    const snap=await db.ref('lobbies').once('value');
    if(!snap.exists()){ list.innerHTML=emptyHtml('No open leagues','Create one or browse back later when rooms open up.'); return; }

    const now=Date.now();
    const TWO_HOURS=2*60*60*1000;
    const results=[];

    const tasks=[];
    snap.forEach(c=>{
      const l={id:c.key,...(c.val()||{})};
      tasks.push(ensureScheduledLobbyState(c.key,l).then(next=>{
      const lobby={id:c.key,...(next||l)};
      const count=Object.keys(lobby.players||{}).length;
      // Remove stale: no players or older than 2 hours
      if(count===0||(!isScheduledLobby(lobby) && lobby.createdAt&&now-lobby.createdAt>TWO_HOURS)){
        db.ref('lobbies/'+c.key).remove().catch(()=>{});
        return;
      }
      if(lobby.isPrivate||lobby.status==='started') return;
      if(browseFilters.format&&lobby.format!==browseFilters.format) return;
      if(browseFilters.teamSize&&lobby.teamSize!==browseFilters.teamSize) return;
      results.push(lobby);
      }).catch(()=>{}));
    });
    if(tasks.length) await Promise.all(tasks);

    if(!results.length){ list.innerHTML=emptyHtml('No open leagues','Try different filters or create a league!'); return; }

    list.innerHTML=results.map(l=>{
      const players=Object.values(l.players||{});
      const count=players.length;
      const full=count>=l.teamSize;
      const open=l.teamSize-count;
      const scheduled=isScheduledLobby(l);
      const locked=isLobbyJoinLocked(l);
      const fmtLabel={snake:'Snake',auction:'Auction'}[l.format]||l.format;
      const scrLabel={h2h_pts:'H2H Pts',h2h_cat:'H2H Cat',roto:'Roto',points:'Points Only',moneyball_pts:'Moneyball H2H Pts',moneyball_cat:'Moneyball Cat'}[l.scoring]||l.scoring;
      const avs=players.slice(0,5).map(p=>`<div class="lobby-av" style="background:${playerColor(p.id||'x')}">${ini(p.name)}</div>`).join('');
      const statusClass=scheduled ? (locked ? 'locked' : 'scheduled') : (full ? 'full' : 'waiting');
      const statusLabel=scheduled ? (locked ? 'Locked' : 'Scheduled') : (full ? 'Full' : open+' spot'+(open!==1?'s':'')+' open');
      const metaLine=scheduled
        ? `Starts ${formatDraftDateTime(l.scheduledStartAt)} · Draft room opens ${formatDraftDateTime(l.draftAccessAt)}`
        : `${count}/${l.teamSize} joined`;
      return `<div class="lobby-card" style="margin-bottom:8px;">
        <div class="lobby-card-top">
          <div class="lobby-name">${l.name||'League'}</div>
          <div class="lobby-status ${statusClass}">${statusLabel}</div>
        </div>
        <div class="lobby-tags">
          <span class="lobby-tag">${fmtLabel}</span>
          <span class="lobby-tag">${scrLabel}</span>
          <span class="lobby-tag">${l.teamSize} teams</span>
        </div>
        <div style="display:flex;align-items:center;justify-content:space-between;margin-top:4px;">
          <div style="display:flex;align-items:center;">
            <div style="display:flex;">${avs}</div>
            <span class="lobby-slots" style="margin-left:${players.length?8:0}px;">${metaLine}</span>
          </div>
          ${canJoinLobbyNow(l)?`<button onclick="joinLobby('${l.id}')" style="background:var(--accent);border:none;border-radius:7px;padding:7px 14px;font-family:var(--fd);font-size:13px;font-weight:800;text-transform:uppercase;color:#fff;cursor:pointer;">Join</button>`:`<span style="font-size:11px;color:var(--text3);">${full?'Full':(locked?'Locked':'Unavailable')}</span>`}
        </div>
      </div>`;
    }).join('');
  }catch(e){ console.error(e); list.innerHTML=emptyHtml('Error loading','Check your Firebase config'); }
}

async function doJoinPrivate(){
  const code=document.getElementById('pvCode')?.value?.trim().toUpperCase();
  const name=document.getElementById('pvName')?.value?.trim()||'Manager';
  if(!code||code.length<4){ toast('Enter a valid code','var(--red)'); return; }
  myName=name; localStorage.setItem('rbPlayerName',name);
  try{
    const snap=await db.ref('lobbies').once('value');
    if(!snap.exists()){ toast('Code not found','var(--red)'); return; }
    let found=null;
    snap.forEach(c=>{ if(c.val().code===code) found={id:c.key,...c.val()}; });
    if(!found){ toast('League not found - check the code','var(--red)'); return; }
    found=await ensureScheduledLobbyState(found.id,found) || found;
    if((found.players||{})[myId]){
      if(canOpenDraftRoom(found)){ openLiveDraft(found); return; }
      showWaitingRoom(found.id);
      return;
    }
    if(found.status==='started'){
      toast('That league is already in progress','var(--red)');
      return;
    }
    if(isLobbyJoinLocked(found) && !(found.players||{})[myId]){
      toast('That league is locked because the draft room is about to open','var(--red)');
      return;
    }
    await joinLobby(found.id);
  }catch(e){ toast('Error joining - try again','var(--red)'); }
}

async function createAndJoinLobby(opts){
  const code=Math.random().toString(36).slice(2,8).toUpperCase();
  const scheduledStartAt=Number(opts.scheduledStartAt||0);
  const draftAccessAt=scheduledStartAt ? Math.max(0, scheduledStartAt - DRAFT_ROOM_UNLOCK_MS) : 0;
  const lobby={
    name:opts.name||'New League',
    sport:opts.sport||MM_SPORT,
    format:opts.format||'snake',
    scoring:opts.scoring||'h2h_pts',
    teamSize:opts.teamSize||10,
    auctionBudget:Math.max(1, Number(opts.auctionBudget||200) || 200),
    settings:opts.settings||JSON.parse(JSON.stringify(MM_RULES_DEFAULT)),
    isPrivate:opts.isPrivate||false,
    draftTiming:scheduledStartAt ? 'scheduled' : 'now',
    scheduledStartAt:scheduledStartAt||null,
    draftAccessAt:draftAccessAt||null,
    draftOrderMode:opts.draftOrderMode||'random_30m',
    finalDraftOrder:null,
    orderFinalizedAt:null,
    draftRoomId:null,
    code, status:scheduledStartAt?'scheduled':'waiting',
    createdBy:myId, createdAt:Date.now(),
    players:{}, chat:{}
  };
  const newRef=db.ref('lobbies').push();
  await newRef.set(lobby);
  if(!newRef.key) throw new Error('Could not create lobby key');
  currentLobbyId=newRef.key;
  await joinLobby(newRef.key);
}

async function leaveLeague(lobbyId, refreshLive){
  try{
    const lobbySnap=await db.ref('lobbies/'+lobbyId).once('value');
    if(!lobbySnap.exists()){
      if(refreshLive) loadLiveDrafts();
      return;
    }
    const lobby=lobbySnap.val()||{};
    const players={...(lobby.players||{})};
    if(players[myId]) delete players[myId];

    const updates={ players };
    const remainingIds=Object.keys(players);
    if(!remainingIds.length){
      await db.ref('lobbies/'+lobbyId).remove();
    }else{
      if(lobby.createdBy===myId){
        updates.createdBy=remainingIds[0];
      }
      await db.ref('lobbies/'+lobbyId).update(updates);
    }

    const saved = localStorage.getItem('rbMultiplayerLobby');
    if(saved){
      try{
        const parsed=JSON.parse(saved);
        if(parsed?.lobbyId===lobbyId) localStorage.removeItem('rbMultiplayerLobby');
      }catch(e){}
    }

    if(refreshLive){
      toast('You left the league');
      loadLiveDrafts();
    }
  }catch(e){
    console.error(e);
    toast('Unable to leave the league right now','var(--red)');
  }
}

async function joinLobby(lobbyId){
  const lobbySnap=await db.ref('lobbies/'+lobbyId).once('value');
  if(!lobbySnap.exists()){
    toast('This league is no longer available','var(--red)');
    return;
  }
  const lobby=await ensureScheduledLobbyState(lobbyId,{id:lobbyId,...(lobbySnap.val()||{})}) || {id:lobbyId,...(lobbySnap.val()||{})};
  if(!canJoinLobbyNow(lobby) && !(lobby.players||{})[myId]){
    toast(isLobbyJoinLocked(lobby)?'This league is locked for order finalization and draft-room access':'That league is not accepting joins right now','var(--red)');
    return;
  }
  await db.ref('lobbies/'+lobbyId+'/players/'+myId).set({
    id:myId,
    uid:currentRbUser?.uid || null,
    userNumber:myUserNumber || 0,
    name:myName,
    joinedAt:Date.now(),
    ready:false
  });
  currentLobbyId=lobbyId;
  myReady=false;
  awardRosterbateScore('multiplayer', 20).catch(() => {});
  showWaitingRoom(lobbyId);
}

function showWaitingRoom(lobbyId){
  document.getElementById('mmLobby').classList.remove('active');
  document.getElementById('mmWaiting').classList.add('active');
  if(lobbyListener) db.ref('lobbies/'+lobbyId).off('value',lobbyListener);
  lobbyListener=db.ref('lobbies/'+lobbyId).on('value',async snap=>{
    if(!snap.exists()){ mmLeaveWaiting(); return; }
    currentLobby=await ensureScheduledLobbyState(lobbyId,{id:lobbyId,...snap.val()}) || {id:lobbyId,...snap.val()};
    renderWaitingRoom(currentLobby);
  });
}

function renderWaitingRoom(lobby){
  document.getElementById('wrTitle').textContent=lobby.name||'Waiting Room';
  document.getElementById('wrCode').textContent='#'+lobby.code;

  const fmtLabel={snake:'Snake',auction:'Auction'}[lobby.format]||lobby.format;
  const scrLabel={h2h_pts:'H2H Pts',h2h_cat:'H2H Cat',roto:'Roto',points:'Points Only',moneyball_pts:'Moneyball H2H Pts',moneyball_cat:'Moneyball Cat'}[lobby.scoring]||lobby.scoring;
  const scheduled=isScheduledLobby(lobby);
  const accessAt=Number(lobby.draftAccessAt||0);
  const canOpenRoom=canOpenDraftRoom(lobby);
  const orderIsManual=String(lobby.draftOrderMode||'random_30m')==='manual';
  const orderLocked=Array.isArray(lobby.finalDraftOrder) && lobby.finalDraftOrder.length===Number(lobby.teamSize||0);
  document.getElementById('wrInfo').innerHTML=`
    <div style="display:flex;flex-wrap:wrap;gap:6px;">
      <span style="background:rgba(249,115,22,.12);border:1px solid rgba(249,115,22,.25);border-radius:6px;padding:4px 10px;font-family:var(--fd);font-size:12px;font-weight:700;color:var(--accent);">${fmtLabel}</span>
      <span style="background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-family:var(--fd);font-size:12px;font-weight:700;color:var(--text2);">${scrLabel}</span>
      <span style="background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-family:var(--fd);font-size:12px;font-weight:700;color:var(--text2);">${lobby.teamSize} Teams</span>
    </div>
    ${scheduled?`<div style="margin-top:10px;font-size:11px;color:var(--text2);line-height:1.6;">
      <div>Scheduled start: <strong style="color:var(--text);">${formatDraftDateTime(lobby.scheduledStartAt)}</strong></div>
      <div>Draft room opens: <strong style="color:var(--text);">${formatDraftDateTime(lobby.draftAccessAt)}</strong></div>
      <div>Draft order: <strong style="color:var(--text);">${orderIsManual?'Manual (host sets it here)':'Randomize 5 minutes before start'}</strong></div>
    </div>`:''}
    ${lobby.isPrivate?`<div style="margin-top:10px;font-size:11px;color:var(--text3);">Share code: <strong style="color:var(--accent);letter-spacing:2px;font-family:var(--fd);font-size:14px;">${lobby.code}</strong> <button onclick="navigator.clipboard&&navigator.clipboard.writeText('${lobby.code}').then(()=>toast('Copied!'))" style="background:var(--bg3);border:1px solid var(--border);border-radius:5px;padding:3px 8px;color:var(--text3);font-size:11px;cursor:pointer;">Copy</button></div>`:''}`;

  const players=Object.values(lobby.players||{});
  let ph=players.map(p=>`
    <div class="wr-player">
      <div class="wr-av" style="background:${playerColor(p.id)}">${ini(p.name)}</div>
      <div style="flex:1;">
        <div style="font-family:var(--fd);font-size:14px;font-weight:700;">${p.name}${p.id===myId?' (You)':''}</div>
        <div style="font-size:11px;color:${p.ready?'var(--green)':'var(--text3)'};">${p.ready?'Ready':'Waiting...'}</div>
      </div>
      ${lobby.createdBy===p.id?'<span style="font-family:var(--fd);font-size:10px;font-weight:800;text-transform:uppercase;color:var(--accent);">Host</span>':''}
    </div>`).join('');
  for(let i=players.length;i<lobby.teamSize;i++) ph+=`<div class="wr-slot"><div class="wr-slot-av"></div><div style="font-size:13px;color:var(--text3);">Waiting for player ${i+1}...</div></div>`;
  document.getElementById('wrPlayers').innerHTML=ph;

  const readyCount=players.filter(p=>p.ready).length;
  document.getElementById('wrReadyCount').textContent=readyCount+'/'+players.length+' ready';
  const myP=lobby.players?.[myId];
  myReady=myP?.ready||false;
  const rb=document.getElementById('wrReadyBtn');
  if(rb){ rb.textContent=myReady?'Ready!':'Ready Up'; rb.className=myReady?'ready-btn is-ready':'ready-btn'; }
  const soloBtn=document.getElementById('wrSoloBtn');
  if(soloBtn){
    const canSolo=lobby.createdBy===myId && players.length===1;
    soloBtn.style.display=canSolo?'block':'none';
  }
  const countdownWrap=document.getElementById('wrCountdown');
  if(countdownWrap && scheduled){
    countdownWrap.style.display='none';
    cdRunning=false;
    clearTimeout(cdTimer);
  }
  if(!scheduled) stopScheduledCountdown();

  const readySection=document.getElementById('wrReadySection');
  if(readySection){
    if(!scheduled){
      readySection.innerHTML=`
        <button class="${myReady?'ready-btn is-ready':'ready-btn'}" id="wrReadyBtn" onclick="mmToggleReady()">${myReady?'Ready!':'Ready Up'}</button>
        <div style="text-align:center;margin-top:8px;font-size:11px;color:var(--text3);" id="wrReadyCount">${readyCount}/${players.length} ready</div>
        <button class="btn-s" id="wrSoloBtn" onclick="mmStartSoloTest()" style="margin-top:10px;display:${lobby.createdBy===myId && players.length===1?'block':'none'};">Start Solo Test</button>
        <button class="btn-danger" onclick="mmLeaveWaiting()" style="margin-top:10px;">Leave League</button>`;
    } else {
      readySection.innerHTML=`
        <div class="card" style="padding:12px;margin-bottom:10px;background:rgba(15,23,42,.5);">
          <div id="wrScheduledStatus" style="font-family:var(--fd);font-size:13px;font-weight:800;text-transform:uppercase;color:${canOpenRoom?'var(--green)':'var(--accent)'};">${canOpenRoom?'Draft Room Open':'Scheduled Draft Lobby'}</div>
          <div id="wrScheduledCopy" style="margin-top:6px;font-size:12px;color:var(--text2);line-height:1.55;"></div>
        </div>
        <button class="ready-btn" onclick="${canOpenRoom?`resumeLiveDraft('${lobby.id}')`:''}" ${canOpenRoom?'':'disabled'} style="${canOpenRoom?'':'opacity:.5;cursor:not-allowed;background:var(--text3);'}">${canOpenRoom?'Open Draft Room':'Draft Room Locked'}</button>
        <button class="btn-danger" onclick="mmLeaveWaiting()" style="margin-top:10px;">Leave League</button>`;
      startScheduledCountdown(lobby);
    }
  }

  const existingOrderCard=document.getElementById('wrOrderCard');
  if(existingOrderCard) existingOrderCard.remove();
  if(scheduled){
    const orderRows=getCurrentDraftOrder(lobby);
    const card=document.createElement('div');
    card.id='wrOrderCard';
    card.className='card';
    card.innerHTML=`
      <div class="ct">Draft Order</div>
      <div style="font-size:11px;color:var(--text3);margin-bottom:10px;">${orderIsManual?'Host can set the exact order here before the room opens.':'Order will randomize automatically 5 minutes before start.'}</div>
      <div>${orderRows.map((player,idx)=>`
        <div style="display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px 10px;margin-bottom:6px;">
          <div style="width:24px;height:24px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-size:11px;font-weight:800;color:#fff;flex-shrink:0;">${idx+1}</div>
          <div class="wr-av" style="width:28px;height:28px;font-size:11px;background:${playerColor(player?.id||'x')}">${ini(player?.name||'?')}</div>
          <div style="flex:1;font-family:var(--fd);font-size:13px;font-weight:700;">${player?.name||('Team '+(idx+1))}${player?.id===myId?' (You)':''}</div>
          ${orderIsManual && lobby.createdBy===myId && !canOpenRoom?`
            <button onclick="moveDraftOrder('${lobby.id}',${idx},-1)" style="background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:5px 8px;color:var(--text2);font-size:11px;cursor:pointer;${idx===0?'opacity:.35;cursor:not-allowed;':''}" ${idx===0?'disabled':''}>↑</button>
            <button onclick="moveDraftOrder('${lobby.id}',${idx},1)" style="background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:5px 8px;color:var(--text2);font-size:11px;cursor:pointer;${idx===orderRows.length-1?'opacity:.35;cursor:not-allowed;':''}" ${idx===orderRows.length-1?'disabled':''}>↓</button>
          `:''}
        </div>`).join('')}</div>
      ${orderIsManual && lobby.createdBy===myId && !canOpenRoom?`<button class="btn-p" onclick="finalizeJoinOrder('${lobby.id}')">${orderLocked?'Save Draft Order':'Use Current Order'}</button>`:''}`;
    document.querySelector('#mmWaiting .sb')?.insertBefore(card, document.getElementById('wrCountdown'));
  }

  // Render chat
  const chatMsgs=Object.entries(lobby.chat||{}).map(([id,val])=>({...(val||{}),_id:id})).sort((a,b)=>a.ts-b.ts);
  const wc=document.getElementById('wrChat');
  if(wc){ wc.innerHTML=chatMsgs.map(m=>`<div style="display:flex;gap:6px;align-items:flex-start;"><div style="width:20px;height:20px;border-radius:50%;background:${playerColor(m.playerId||'x')};display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-size:8px;font-weight:800;color:#fff;flex-shrink:0;margin-top:2px;">${ini(m.name)}</div><div style="flex:1;min-width:0;"><span style="font-family:var(--fd);font-size:11px;font-weight:700;color:var(--text3);">${escapeHtml(m.name)}${ADMIN_USER_NUMBERS.includes(Number(m.userNumber||0))?' ♛':''}: </span><span style="font-size:12px;color:var(--text);">${escapeHtml(m.text)}</span>${myIsAdmin&&m.playerId!==myId&&!isProtectedChatUser(m.playerId,m.userNumber)?`<div style="display:flex;gap:6px;margin-top:4px;"><button onclick="mmDeleteLobbyChatMessage('${m._id}')" style="background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:2px 7px;color:var(--text2);font-size:10px;cursor:pointer;">Delete</button><button onclick="mmBanGlobalChatPlayer('${m.playerId}','${escapeHtml(m.name)}')" style="background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.35);border-radius:6px;padding:2px 7px;color:#fca5a5;font-size:10px;cursor:pointer;">Ban</button></div>`:''}</div></div>`).join('');wc.scrollTop=wc.scrollHeight;}

  // Check all ready + enough players
  if(!scheduled && players.length>=2&&players.every(p=>p.ready)&&!cdRunning) startCountdown();
}

function mmToggleReady(){
  if(!currentLobbyId) return;
  myReady=!myReady;
  db.ref('lobbies/'+currentLobbyId+'/players/'+myId+'/ready').set(myReady);
}

async function mmStartSoloTest(){
  if(!currentLobbyId || !currentLobby) return;
  const players=Object.values(currentLobby.players||{});
  if(currentLobby.createdBy!==myId || players.length!==1){
    toast('Solo test is only available to the host when alone in the lobby.','var(--red)');
    return;
  }
  try{
    const soloLobby={
      ...currentLobby,
      id:currentLobbyId,
      teamSize:1,
      soloTest:true,
      players:{
        [myId]:{
          ...(currentLobby.players?.[myId]||{}),
          id:myId,
          name:myName,
          ready:true,
          joinedAt:currentLobby.players?.[myId]?.joinedAt||Date.now()
        }
      }
    };
    currentLobby=soloLobby;
    saveMultiplayerLobbyState(soloLobby);
    await db.ref('lobbies/'+currentLobbyId).update({
      status:'started',
      teamSize:1,
      soloTest:true,
      ['players/'+myId+'/ready']:true
    });
    window.location.href='rosterbate-draft.html?lobby='+currentLobbyId;
  }catch(e){
    console.error(e);
    toast('Could not start solo test','var(--red)');
  }
}

function mmSendLobbyChat(){
  const input=document.getElementById('wrChatInput');
  const text=(input?.value||'').trim();
  if(!text||!currentLobbyId) return;
  if(isChatBanned(myId)){
    toast('You are banned from matchmaking chat','var(--red)');
    return;
  }
  input.value='';
  db.ref('lobbies/'+currentLobbyId+'/chat').push({playerId:myId,userNumber:myUserNumber||0,name:myName,text,ts:Date.now()});
}
function mmDeleteLobbyChatMessage(messageId){
  if(!myIsAdmin || !currentLobbyId || !messageId) return;
  db.ref('lobbies/'+currentLobbyId+'/chat/'+messageId).remove().then(()=>toast('Lobby message removed')).catch(e=>{console.error(e);toast('Could not remove message','var(--red)');});
}

function startCountdown(){
  cdRunning=true;
  document.getElementById('wrReadySection').style.display='none';
  document.getElementById('wrCountdown').style.display='block';
  let secs=5;
  const circ=document.getElementById('cdCircle');
  const numEl=document.getElementById('cdNum');
  function tick(){
    if(numEl) numEl.textContent=secs;
    if(circ) circ.style.strokeDashoffset=276*(1-secs/5);
    if(secs<=0){ launchDraft(); return; }
    secs--;
    cdTimer=setTimeout(tick,1000);
  }
  tick();
}

function stopScheduledCountdown(){
  if(scheduledCountdownTimer){
    clearTimeout(scheduledCountdownTimer);
    scheduledCountdownTimer=null;
  }
}

function startScheduledCountdown(lobby){
  stopScheduledCountdown();
  const lobbyId=lobby?.id;
  const accessAt=Number(lobby?.draftAccessAt||0);
  const statusEl=document.getElementById('wrScheduledStatus');
  const copyEl=document.getElementById('wrScheduledCopy');
  if(!lobbyId || !statusEl || !copyEl || !accessAt) return;
  function tick(){
    if(!currentLobby || currentLobby.id!==lobbyId){
      stopScheduledCountdown();
      return;
    }
    const now=Date.now();
    const latestLobby=currentLobby;
    const canOpenRoom=canOpenDraftRoom(latestLobby);
    const orderIsManual=String(latestLobby?.draftOrderMode||'random_30m')==='manual';
    const orderLocked=Array.isArray(latestLobby?.finalDraftOrder) && latestLobby.finalDraftOrder.length===Number(latestLobby?.teamSize||0);
    statusEl.textContent=canOpenRoom?'Draft Room Open':'Scheduled Draft Lobby';
    statusEl.style.color=canOpenRoom?'var(--green)':'var(--accent)';
    if(now < accessAt){
      copyEl.textContent=`Draft room unlocks in ${formatCountdown(accessAt-now)}.`;
      scheduledCountdownTimer=setTimeout(tick,1000);
      return;
    }
    if(!orderLocked && orderIsManual){
      copyEl.textContent='Host must set and save the manual draft order before the room opens.';
    } else {
      copyEl.textContent='Draft room is open. Enter any time before the scheduled start.';
    }
    stopScheduledCountdown();
  }
  tick();
}

function launchDraft(){
  if(!currentLobby) return;
  saveMultiplayerLobbyState(currentLobby);
  db.ref('lobbies/'+currentLobbyId+'/status').set('started');
  window.location.href='rosterbate-draft.html?lobby='+currentLobbyId;
}

async function mmLeaveWaiting(){
  cdRunning=false; clearTimeout(cdTimer); stopScheduledCountdown();
  if(currentLobbyId){
    const leavingLobbyId=currentLobbyId;
    if(lobbyListener){ db.ref('lobbies/'+currentLobbyId).off('value',lobbyListener); lobbyListener=null; }
    currentLobbyId=null;
    currentLobby=null;
    myReady=false;
    await leaveLeague(leavingLobbyId, false);
  }
  document.getElementById('mmWaiting').classList.remove('active');
  document.getElementById('mmLobby').classList.add('active');
  toast('You left the league');
}

async function updatePresence(){
  try{
    await presenceRef.update({name:myName,ts:Date.now()});
    const snap=await db.ref('presence').once('value');
    if(!snap.exists()){ document.getElementById('mmOnline').textContent='1 online'; return; }
    const now=Date.now();let count=0;
    snap.forEach(c=>{ if(now-c.val().ts<30000) count++; });
    document.getElementById('mmOnline').textContent=count+' online';
  }catch(e){ document.getElementById('mmOnline').textContent='offline'; }
}

connectedRef.on('value', async snap=>{
  if(snap.val() !== true){
    document.getElementById('mmOnline').textContent='offline';

  try{
    await presenceRef.onDisconnect().remove();
    await presenceRef.set({name:myName,ts:Date.now()});

  }catch(e){
    document.getElementById('mmOnline').textContent='offline';
  }
});
